kind = "web"
previewPath = "/"
title = "AutoFlow"
version = "1.0.0"
id = "artifacts/autoflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21036
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/autoflow run dev"

[services.env]
PORT = "21036"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/autoflow", "run", "build"]
publicDir = "artifacts/autoflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
